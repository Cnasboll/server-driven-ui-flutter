# Login / Register screen.
# Auth namespace (auth.shql): LOGIN_EMAIL, LOGIN_PASSWORD, LOGIN_ERROR,
#   LOGIN_IS_LOADING, LOGIN_IS_REGISTERING, LOGIN_SUBMIT(), LOGIN_TOGGLE_MODE()
widget:
  type: Scaffold
  props:
    backgroundColor: "0xFF1A237E"
    body:
      type: Center
      props:
        child:
          type: SingleChildScrollView
          props:
            padding: 32
            child:
              type: ConstrainedBox
              props:
                maxWidth: 400
                child:
                  type: Column
                  props:
                    mainAxisAlignment: "center"
                    children:
                      - type: Icon
                        props:
                          icon: "shield"
                          size: 80
                          color: "0xFFFFFFFF"
                      - type: SizedBox
                        props:
                          height: 16
                      - type: Text
                        props:
                          data: "HeroDex 3000"
                          style:
                            fontSize: 28
                            fontWeight: "bold"
                            color: "0xFFFFFFFF"
                            fontFamily: "Orbitron"
                      - type: SizedBox
                        props:
                          height: 8
                      - type: Observer
                        props:
                          query: "Auth.LOGIN_IS_REGISTERING"
                          builder:
                            type: Text
                            props:
                              data: "shql: Auth.LOGIN_TITLE()"
                              style:
                                fontSize: 16
                                color: "0xB3FFFFFF"
                      - type: SizedBox
                        props:
                          height: 32
                      - type: Card
                        props:
                          child:
                            type: Padding
                            props:
                              padding: 24
                              child:
                                type: Column
                                props:
                                  crossAxisAlignment: "stretch"
                                  children:
                                    - type: TextField
                                      props:
                                        keyboardType: "emailAddress"
                                        textInputAction: "next"
                                        debounceMs: 0
                                        onChanged: "shql: Auth.SET_LOGIN_EMAIL(value)"
                                        decoration:
                                          labelText: "Email"
                                          prefixIcon: "email"
                                          border: "outline"
                                    - type: SizedBox
                                      props:
                                        height: 16
                                    - type: TextField
                                      props:
                                        obscureText: true
                                        textInputAction: "done"
                                        debounceMs: 0
                                        onSubmitted: "shql: Auth.LOGIN_SUBMIT()"
                                        onChanged: "shql: Auth.SET_LOGIN_PASSWORD(value)"
                                        decoration:
                                          labelText: "Password"
                                          prefixIcon: "lock"
                                          border: "outline"
                                    - type: Observer
                                      props:
                                        query: "Auth.LOGIN_ERROR"
                                        builder:
                                          type: Column
                                          props:
                                            crossAxisAlignment: "start"
                                            children: "shql: Auth.LOGIN_ERROR_CHILDREN()"
                                    - type: SizedBox
                                      props:
                                        height: 24
                                    - type: Observer
                                      props:
                                        query: "Auth.LOGIN_IS_LOADING,Auth.LOGIN_IS_REGISTERING"
                                        builder:
                                          type: FilledButton
                                          props:
                                            onPressed: "shql: Auth.LOGIN_SUBMIT_IF_READY()"
                                            child: "shql: Auth.LOGIN_BUTTON_CHILD()"
                                    - type: SizedBox
                                      props:
                                        height: 12
                                    - type: Observer
                                      props:
                                        query: "Auth.LOGIN_IS_LOADING,Auth.LOGIN_IS_REGISTERING"
                                        builder:
                                          type: TextButton
                                          props:
                                            onPressed: "shql: Auth.LOGIN_TOGGLE_IF_READY()"
                                            child:
                                              type: Text
                                              props:
                                                data: "shql: Auth.LOGIN_TOGGLE_TEXT()"
