# HeroDex 3000 - Hero Detail Screen
screen:
  type: Scaffold
  props:
    appBar:
      type: AppBar
      props:
        leading:
          type: IconButton
          props:
            icon: "arrow_back"
            onPressed: "shql: Nav.GO_BACK()"
        title:
          type: Observer
          props:
            query: "Heroes.selected_hero"
            builder:
              type: Text
              props:
                data: "shql: Heroes.SELECTED_HERO_TITLE()"
                style:
                  fontFamily: "Orbitron"
        actions:
          # Edit button (only for saved heroes)
          - type: Observer
            props:
              query: "Heroes.selected_hero"
              builder:
                type: "shql: Heroes.IS_SAVED_HERO_TYPE()"
                props:
                  icon: "edit"
                  onPressed: "shql: HeroEdit.EDIT_HERO()"
                  width: 0
                  height: 0
          # Lock toggle button (only for saved heroes)
          - type: Observer
            props:
              query: "Heroes.selected_hero"
              builder:
                type: "shql: Heroes.IS_SAVED_HERO_TYPE()"
                props:
                  icon: "shql: Heroes.SELECTED_LOCK_ICON()"
                  onPressed: "shql: Heroes.TOGGLE_LOCK(Heroes.selected_hero.ID)"
                  width: 0
                  height: 0
          # Delete button (only for saved heroes)
          - type: Observer
            props:
              query: "Heroes.selected_hero"
              builder:
                type: "shql: Heroes.IS_SAVED_HERO_TYPE()"
                props:
                  icon: "delete"
                  onPressed: "shql: Heroes.DELETE_SELECTED_AND_GO_BACK()"
                  width: 0
                  height: 0

    # Body: data-driven from _detail_fields metadata (generated by HeroSchema)
    body:
      type: Observer
      props:
        query: "Heroes.selected_hero"
        builder: "shql: Detail.GENERATE_HERO_DETAIL()"

    bottomNavigationBar:
      type: BottomNav
      props:
        currentIndex: 0
        onTap: "Nav.TAB_NAV(-1, value)"
